<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ton-Finder - Gitarren-Lerntools</title>
  <link rel="stylesheet" href="../../style.css" />
</head>
<body>
  <section id="view-ton-finder" class="view active">
    <gt-exercise-header title="Ton-Finder" score-type="points"></gt-exercise-header>

    <p class="question-prompt">
      Finde alle Positionen von: <strong id="ton-finder-target-note">C</strong>
    </p>

    <gt-fretboard id="ton-finder-svg" class="fretboard-container" interactive></gt-fretboard>

    <p id="ton-finder-feedback" class="feedback-text"></p>

    <div class="settings-panel">
      <div class="settings-row">
        <label for="ton-finder-fret-range-slider" class="settings-label">
          Bünde: <span id="ton-finder-fret-range-label">0 – 5</span>
        </label>
        <input type="range" id="ton-finder-fret-range-slider" min="0" max="12" value="5" />
      </div>

      <div class="settings-row">
        <span class="settings-label">Saiten:</span>
        <div id="ton-finder-string-toggles" class="string-toggles">
          <button class="btn-string active" data-string="0">E2</button>
          <button class="btn-string active" data-string="1">A2</button>
          <button class="btn-string active" data-string="2">D3</button>
          <button class="btn-string active" data-string="3">G3</button>
          <button class="btn-string active" data-string="4">B3</button>
          <button class="btn-string active" data-string="5">E4</button>
        </div>
      </div>

      <div class="settings-row">
        <label for="ton-finder-difficulty" class="settings-label">Schwierigkeit:</label>
        <select id="ton-finder-difficulty" class="metronome-select">
          <option value="natural">Nur natürliche Töne</option>
          <option value="all" selected>Alle Töne inkl. #</option>
        </select>
      </div>
    </div>

    <div class="ton-finder-controls">
      <button id="btn-ton-finder-finish" class="btn-start">Fertig</button>
      <button id="btn-ton-finder-next" class="btn-mode" disabled>Nächste Runde</button>
    </div>
  </section>

  <script type="module" src="./bootstrap.js"></script>
</body>
</html>

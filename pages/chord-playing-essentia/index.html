<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akkord spielen (Beta) - Gitarren-Lerntools</title>
  <link rel="stylesheet" href="../../style.css" />
</head>
<body>
  <section id="view-chord-exercise-essentia" class="view active">
    <gt-exercise-header title="Akkord spielen" score-type="correct"></gt-exercise-header>

    <div class="chord-trainer-container">
      <h2 id="ece-chord-name" class="chord-title-display">C-Dur</h2>

      <gt-fretboard id="ece-chord-fretboard" class="chord-diagram-container" frets="5"></gt-fretboard>

      <p id="ece-essentia-status" class="ece-status"></p>
      <p id="feedback-text" class="feedback-text"></p>

      <div class="chord-controls">
        <button id="btn-ece-listen" class="btn-start">Weiter</button>
      </div>

      <div class="settings-panel">
        <div class="settings-row-vertical">
          <span class="settings-label">Akkord-Kategorien:</span>
          <div class="category-checkboxes">
            <label class="checkbox-label">
              <input type="checkbox" id="ece-cat-simplified" checked> Einsteiger (vereinfacht)
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="ece-cat-standard"> Standard (CAGED)
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="ece-cat-extended"> Weiterführend (7er, F)
            </label>
            <label class="checkbox-label">
              <input type="checkbox" id="ece-cat-sus-add"> Sus &amp; Add
            </label>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script type="module" src="./bootstrap.js"></script>
</body>
</html>

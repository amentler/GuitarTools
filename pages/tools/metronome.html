<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metronom - Gitarren-Lerntools</title>
  <link rel="stylesheet" href="../../style.css" />
</head>
<body>
  <section id="view-metronome" class="view active">
    <gt-exercise-header title="Metronom"></gt-exercise-header>

    <div id="metronome-display" class="metronome-container"></div>

    <div class="metronome-controls">
      <div class="bpm-display-container">
        <span id="metronome-bpm-value" class="bpm-value">120</span>
        <span class="bpm-unit">BPM</span>
      </div>

      <input type="range" id="metronome-bpm-slider" min="40" max="240" value="120" class="bpm-slider" />

      <div class="bpm-buttons">
        <button id="btn-metronome-minus-5" class="btn-bpm">-5</button>
        <button id="btn-metronome-minus-1" class="btn-bpm">-1</button>
        <button id="btn-metronome-plus-1" class="btn-bpm">+1</button>
        <button id="btn-metronome-plus-5" class="btn-bpm">+5</button>
      </div>
    </div>

    <div class="metronome-settings">
      <div class="settings-row">
        <label for="metronome-beats-select" class="settings-label">Taktart:</label>
        <select id="metronome-beats-select" class="metronome-select">
          <option value="2">2/4</option>
          <option value="3">3/4</option>
          <option value="4" selected>4/4</option>
          <option value="6">6/8</option>
        </select>
      </div>
    </div>

    <button id="btn-metronome-toggle" class="btn-start-toggle">Start</button>
  </section>

  <script type="module">
    import { createMetronomeExercise } from '../../js/tools/metronome/metronome.js';
    import '../../js/components/index.js';

    const metronome = createMetronomeExercise();
    metronome.startExercise();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akkord Übersicht - Gitarren-Lerntools</title>
  <link rel="stylesheet" href="../../style.css" />
</head>
<body>
  <section id="view-akkord-uebersicht" class="view active">
    <gt-exercise-header title="Akkord Übersicht"></gt-exercise-header>

    <div class="akkord-filter-bar">
      <div class="akkord-filter-row">
        <span class="akkord-filter-label">Grundton</span>
        <div class="akkord-filter-group" id="filter-root">
          <button class="akkord-filter-btn active" data-value="">Alle</button>
          <button class="akkord-filter-btn" data-value="A">A</button>
          <button class="akkord-filter-btn" data-value="C">C</button>
          <button class="akkord-filter-btn" data-value="D">D</button>
          <button class="akkord-filter-btn" data-value="E">E</button>
          <button class="akkord-filter-btn" data-value="F">F</button>
          <button class="akkord-filter-btn" data-value="G">G</button>
          <button class="akkord-filter-btn" data-value="H">H</button>
        </div>
      </div>
      <div class="akkord-filter-row">
        <span class="akkord-filter-label">Typ</span>
        <div class="akkord-filter-group" id="filter-type">
          <button class="akkord-filter-btn active" data-value="">Alle</button>
          <button class="akkord-filter-btn" data-value="Dur">Dur</button>
          <button class="akkord-filter-btn" data-value="Moll">Moll</button>
          <button class="akkord-filter-btn" data-value="Dom7">Dom7</button>
          <button class="akkord-filter-btn" data-value="Maj7">Maj7</button>
          <button class="akkord-filter-btn" data-value="Min7">Min7</button>
          <button class="akkord-filter-btn" data-value="Dim">Dim</button>
          <button class="akkord-filter-btn" data-value="Sus">Sus</button>
          <button class="akkord-filter-btn" data-value="Add">Add</button>
        </div>
      </div>
    </div>

    <div id="akkord-uebersicht-container"></div>
  </section>

  <script type="module" src="./bootstrap.js"></script>
</body>
</html>

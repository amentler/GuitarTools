<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>

  <!-- Guitar body (figure-8 shape) -->
  <ellipse cx="256" cy="340" rx="88" ry="100" fill="#f5a623"/>
  <ellipse cx="256" cy="240" rx="66" ry="76" fill="#f5a623"/>

  <!-- Sound hole -->
  <circle cx="256" cy="340" r="32" fill="#1a1a2e"/>
  <circle cx="256" cy="340" r="28" fill="none" stroke="#f5a623" stroke-width="4"/>

  <!-- Neck -->
  <rect x="242" y="100" width="28" height="160" rx="8" fill="#c87d1a"/>

  <!-- Headstock -->
  <rect x="234" y="72" width="44" height="40" rx="8" fill="#c87d1a"/>

  <!-- Tuning pegs -->
  <circle cx="228" cy="80" r="7" fill="#eaeaea"/>
  <circle cx="228" cy="97" r="7" fill="#eaeaea"/>
  <circle cx="228" cy="114" r="7" fill="#eaeaea"/>
  <circle cx="284" cy="80" r="7" fill="#eaeaea"/>
  <circle cx="284" cy="97" r="7" fill="#eaeaea"/>
  <circle cx="284" cy="114" r="7" fill="#eaeaea"/>

  <!-- Strings (6) -->
  <line x1="244" y1="112" x2="228" y2="430" stroke="#eaeaea" stroke-width="1.2" opacity="0.7"/>
  <line x1="249" y1="112" x2="237" y2="430" stroke="#eaeaea" stroke-width="1.4" opacity="0.7"/>
  <line x1="254" y1="112" x2="246" y2="430" stroke="#eaeaea" stroke-width="1.6" opacity="0.7"/>
  <line x1="258" y1="112" x2="266" y2="430" stroke="#eaeaea" stroke-width="1.6" opacity="0.7"/>
  <line x1="263" y1="112" x2="275" y2="430" stroke="#eaeaea" stroke-width="1.4" opacity="0.7"/>
  <line x1="268" y1="112" x2="284" y2="430" stroke="#eaeaea" stroke-width="1.2" opacity="0.7"/>

  <!-- Bridge -->
  <rect x="220" y="420" width="72" height="12" rx="4" fill="#c87d1a"/>

  <!-- Fret accent -->
  <line x1="240" y1="160" x2="272" y2="160" stroke="#eaeaea" stroke-width="2.5" opacity="0.5"/>
  <line x1="240" y1="188" x2="272" y2="188" stroke="#eaeaea" stroke-width="2.5" opacity="0.5"/>
  <line x1="240" y1="216" x2="272" y2="216" stroke="#eaeaea" stroke-width="2.5" opacity="0.5"/>
</svg>
